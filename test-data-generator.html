<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSVD-R1 Test Data Generator v1.1 - TEST</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }
        .chart-container {
            background: linear-gradient(90deg, #f8fafc 0%, #f1f5f9 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // Test Data Generation Component
        function TestDataGenerator() {
            const [P, setP] = useState(1000);
            const [N, setN] = useState(100);
            const [K, setK] = useState(50);
            const [signalScale, setSignalScale] = useState(0.6);
            const [noiseVariance, setNoiseVariance] = useState(0.14);
            const [testMatrix, setTestMatrix] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [showHelp, setShowHelp] = useState(false);

            // Reset function to restore default values
            const resetToDefaults = () => {
                setP(1000);
                setN(100);
                setK(50);
                setSignalScale(0.6);
                setNoiseVariance(0.14);
                setTestMatrix(null);
                setIsGenerating(false);
                setShowHelp(false);
            };

            // Calculate Signal-to-Noise Ratio
            const snr = useMemo(() => {
                if (K === 0) return -Infinity;
                const sigPwr = K * signalScale * signalScale;
                const noisePwr = P * noiseVariance;
                return 10 * Math.log10(sigPwr / noisePwr);
            }, [signalScale, noiseVariance, P, K]);

            // Box-Muller transform for generating Gaussian noise
            const generateGaussianNoise = (variance) => {
                const u1 = Math.random();
                const u2 = Math.random();
                const z0 = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
                return z0 * Math.sqrt(variance);
            };

            // Generate test matrix with embedded signals
            const generateTestMatrix = async () => {
                setIsGenerating(true);
                
                try {
                    // Small delay for UI responsiveness
                    await new Promise(resolve => setTimeout(resolve, 50));
                    
                    // Validation
                    if (K > P) {
                        alert('K (Active Rows) cannot be greater than P (Variables)');
                        setIsGenerating(false);
                        return;
                    }
                    
                    // Initialize matrix with Gaussian noise
                    const matrix = Array(P).fill().map(() => 
                        Array(N).fill().map(() => generateGaussianNoise(noiseVariance))
                    );
                    
                    // Randomly select K rows for signal embedding
                    const selectedRows = [];
                    while (selectedRows.length < K) {
                        const row = Math.floor(Math.random() * P);
                        if (!selectedRows.includes(row)) {
                            selectedRows.push(row);
                        }
                    }
                    selectedRows.sort((a, b) => a - b);
                    
                    // Embed step function signal in selected rows
                    selectedRows.forEach(rowIdx => {
                        for (let j = 0; j < N; j++) {
                            // Step function: negative for first half, positive for second half
                            const stepValue = j < N/2 ? -signalScale : signalScale;
                            matrix[rowIdx][j] += stepValue;
                        }
                    });
                    
                    setTestMatrix({ matrix, selectedRows });
                    
                } catch (error) {
                    console.error('Error generating matrix:', error);
                    alert('Error generating test matrix: ' + error.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            // Signal visualization data for first signal row
            const signalVisualizationData = useMemo(() => {
                if (!testMatrix || testMatrix.selectedRows.length === 0) return null;
                
                const firstSignalRow = testMatrix.selectedRows[0];
                const signalData = testMatrix.matrix[firstSignalRow];
                
                return {
                    observed: signalData,
                    trueSignal: Array(N).fill().map((_, idx) => idx < N/2 ? -signalScale : signalScale),
                    noise: signalData.map((obs, idx) => {
                        const trueSig = idx < N/2 ? -signalScale : signalScale;
                        return obs - trueSig;
                    }),
                    rowIndex: firstSignalRow
                };
            }, [testMatrix, N, signalScale]);

            return (
                <div className="p-6 max-w-7xl mx-auto bg-gray-50 min-h-screen">
                    {/* Help Modal */}
                    {showHelp && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                            <div className="bg-white rounded-lg p-6 max-w-4xl mx-4 shadow-xl max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-start mb-4">
                                    <h3 className="text-xl font-semibold text-gray-800">Test Data Generator Help</h3>
                                    <button onClick={() => setShowHelp(false)} className="text-gray-500 hover:text-gray-700 text-2xl">×</button>
                                </div>
                                <div className="space-y-4 text-sm">
                                    <div>
                                        <h4 className="font-semibold text-gray-700 mb-2">🎯 Purpose</h4>
                                        <p className="text-gray-600">
                                            This tool generates synthetic biomarker data matrices for SSVD-R1 testing. It creates a P×N matrix with embedded step-function signals in K randomly selected rows.
                                        </p>
                                    </div>
                                    <div>
                                        <h4 className="font-semibold text-gray-700 mb-2">📊 Matrix Structure</h4>
                                        <ul className="list-disc list-inside space-y-1 text-gray-600">
                                            <li><strong>P:</strong> Number of variables/features (e.g., genes, proteins)</li>
                                            <li><strong>N:</strong> Number of samples/observations (e.g., patients)</li>
                                            <li><strong>K:</strong> Number of signal variables (true biomarkers)</li>
                                        </ul>
                                    </div>
                                    <div>
                                        <h4 className="font-semibold text-gray-700 mb-2">⚙️ Signal Parameters</h4>
                                        <ul className="list-disc list-inside space-y-1 text-gray-600">
                                            <li><strong>Signal Scale:</strong> Amplitude of the embedded step signal</li>
                                            <li><strong>Noise Variance:</strong> Background Gaussian noise level</li>
                                            <li><strong>SNR:</strong> Computed signal-to-noise ratio in dB</li>
                                        </ul>
                                    </div>
                                    <div>
                                        <h4 className="font-semibold text-gray-700 mb-2">🔬 Signal Design</h4>
                                        <p className="text-gray-600">
                                            Each signal row contains a step function: negative values for the first N/2 samples, positive values for the last N/2 samples, plus Gaussian noise.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Main Header */}
                    <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <h1 className="text-3xl font-bold text-gray-800 mb-2">
                                    SSVD-R1: Test Data Generator
                                </h1>
                                <p className="text-gray-600 mb-3">
                                    Generate synthetic biomarker data matrices with embedded step-function signals
                                </p>
                                <div className="flex items-center space-x-4 text-sm text-gray-500">
                                    <span>🧬 Biomarker Data</span>
                                    <span>📊 Step Function Signals</span>
                                    <span>🎯 SSVD-R1 Testing</span>
                                </div>
                            </div>
                            <div className="flex space-x-2">
                                <button
                                    onClick={() => setShowHelp(true)}
                                    className="flex items-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md transition-colors shadow-md"
                                >
                                    <span>❓</span>
                                    <span>Help</span>
                                </button>
                                <button
                                    onClick={resetToDefaults}
                                    className="flex items-center space-x-2 bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-md transition-colors shadow-md"
                                    disabled={isGenerating}
                                >
                                    <span>🔄</span>
                                    <span>Reset</span>
                                </button>
                            </div>
                        </div>
                        
                        {/* Configuration Section */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                            <div className="space-y-4">
                                <h3 className="font-semibold text-gray-700 flex items-center">
                                    <span className="text-lg mr-2">📊</span>
                                    Matrix Dimensions
                                </h3>
                                <div>
                                    <label className="block text-sm font-medium text-gray-600 mb-1">
                                        P (Variables/Features): {P}
                                        <span className="text-xs text-gray-500 ml-1">(e.g., genes, proteins)</span>
                                    </label>
                                    <input
                                        type="range"
                                        min="10"
                                        max="2000"
                                        step="10"
                                        value={P}
                                        onChange={(e) => setP(parseInt(e.target.value))}
                                        className="w-full"
                                        disabled={isGenerating}
                                    />
                                    <div className="flex justify-between text-xs text-gray-500 mt-1">
                                        <span>10</span>
                                        <span>2000</span>
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-600 mb-1">
                                        N (Samples/Observations): {N}
                                        <span className="text-xs text-gray-500 ml-1">(e.g., patients)</span>
                                    </label>
                                    <input
                                        type="range"
                                        min="10"
                                        max="500"
                                        step="5"
                                        value={N}
                                        onChange={(e) => setN(parseInt(e.target.value))}
                                        className="w-full"
                                        disabled={isGenerating}
                                    />
                                    <div className="flex justify-between text-xs text-gray-500 mt-1">
                                        <span>10</span>
                                        <span>500</span>
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-600 mb-1">
                                        K (True Signal Variables): {K}
                                        <span className="text-xs text-gray-500 ml-1">(known biomarkers)</span>
                                    </label>
                                    <input
                                        type="range"
                                        min="0"
                                        max={Math.min(P, 200)}
                                        step="1"
                                        value={K}
                                        onChange={(e) => setK(parseInt(e.target.value))}
                                        className="w-full"
                                        disabled={isGenerating}
                                    />
                                    <div className="flex justify-between text-xs text-gray-500 mt-1">
                                        <span>0 (null hypothesis)</span>
                                        <span>{Math.min(P, 200)}</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="space-y-4">
                                <h3 className="font-semibold text-gray-700 flex items-center">
                                    <span className="text-lg mr-2">⚙️</span>
                                    Signal Parameters
                                </h3>
                                <div>
                                    <label className="block text-sm font-medium text-gray-600 mb-1">
                                        Signal Scale: {signalScale.toFixed(2)}
                                    </label>
                                    <input
                                        type="range"
                                        min="0.1"
                                        max="3"
                                        step="0.01"
                                        value={signalScale}
                                        onChange={(e) => setSignalScale(parseFloat(e.target.value))}
                                        className="w-full"
                                        disabled={isGenerating}
                                    />
                                    <div className="flex justify-between text-xs text-gray-500 mt-1">
                                        <span>Weak (0.1)</span>
                                        <span>Strong (3.0)</span>
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-600 mb-1">
                                        Noise Variance: {noiseVariance.toFixed(3)}
                                    </label>
                                    <input
                                        type="range"
                                        min="0.01"
                                        max="3"
                                        step="0.001"
                                        value={noiseVariance}
                                        onChange={(e) => setNoiseVariance(parseFloat(e.target.value))}
                                        className="w-full"
                                        disabled={isGenerating}
                                    />
                                    <div className="flex justify-between text-xs text-gray-500 mt-1">
                                        <span>Low (0.01)</span>
                                        <span>High (3.0)</span>
                                    </div>
                                </div>
                                <div className="bg-blue-50 p-4 rounded-lg border border-blue-200">
                                    <p className="text-sm font-medium text-blue-800 mb-1">📡 Signal-to-Noise Ratio</p>
                                    <p className="text-2xl font-bold text-blue-900">
                                        {K === 0 ? "No Signal" : `${snr.toFixed(2)} dB`}
                                    </p>
                                    <p className="text-xs text-blue-700 mt-1">
                                        {K === 0 ? "Perfect for null hypothesis testing" : 
                                         snr > 0 ? "Good detectability" : "Challenging detection"}
                                    </p>
                                </div>
                            </div>
                        </div>
                        
                        {/* Generate Button */}
                        <div className="mb-6">
                            <button
                                onClick={generateTestMatrix}
                                disabled={isGenerating}
                                className="w-full bg-green-600 hover:bg-green-700 disabled:bg-green-300 text-white font-semibold py-4 px-6 rounded-lg transition-colors shadow-lg"
                            >
                                {isGenerating ? (
                                    <span className="flex items-center justify-center">
                                        <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                        </svg>
                                        Generating Test Data...
                                    </span>
                                ) : (
                                    <span className="flex items-center justify-center">
                                        <span className="text-lg mr-2">🧬</span>
                                        Generate Biomarker Test Data
                                    </span>
                                )}
                            </button>
                            <p className="text-xs text-center text-gray-500 mt-2">
                                Creates synthetic data matrix with embedded biomarker signals for SSVD-R1 analysis
                            </p>
                        </div>

                        {/* Success Message */}
                        {testMatrix && (
                            <div className="bg-green-50 border border-green-200 rounded-lg p-4">
                                <h3 className="font-semibold text-green-800 mb-3 flex items-center">
                                    <span className="text-lg mr-2">✅</span>
                                    Test Data Successfully Generated
                                </h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm text-green-700">
                                    <div>
                                        <p className="font-medium">Matrix Size</p>
                                        <p>{P} × {N}</p>
                                    </div>
                                    <div>
                                        <p className="font-medium">Signal Variables</p>
                                        <p>{K} ({(K/P*100).toFixed(1)}%)</p>
                                    </div>
                                    <div>
                                        <p className="font-medium">SNR</p>
                                        <p>{K === 0 ? "No Signal" : `${snr.toFixed(2)} dB`}</p>
                                    </div>
                                    <div>
                                        <p className="font-medium">Signal Rows</p>
                                        <p className="text-xs font-mono">
                                            {testMatrix.selectedRows?.length > 10 
                                                ? `${testMatrix.selectedRows?.slice(0, 10).join(', ')}...` 
                                                : testMatrix.selectedRows?.join(', ') || 'None'}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Signal Visualization */}
                    {testMatrix && (
                        <div className="bg-white rounded-lg shadow-lg p-6">
                            <h3 className="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                                <span className="text-2xl mr-2">📈</span>
                                Signal Visualization
                            </h3>
                            
                            {testMatrix.selectedRows.length === 0 ? (
                                <div className="h-64 flex items-center justify-center bg-gray-50 rounded-lg border-2 border-dashed border-gray-300">
                                    <div className="text-center">
                                        <p className="text-lg font-medium text-gray-600 mb-2">🔍 Null Hypothesis Scenario</p>
                                        <p className="text-sm text-gray-500">No signal rows present (K=0) - ideal for testing false discovery rates</p>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    <p className="text-gray-600">
                                        Displaying the first signal variable (row {signalVisualizationData.rowIndex}) showing the embedded step-function pattern.
                                    </p>
                                    
                                    <div className="chart-container h-80 border border-gray-300 rounded bg-white">
                                        <SignalChart data={signalVisualizationData} N={N} />
                                    </div>
                                    
                                    <div className="flex items-center space-x-6 text-sm">
                                        <div className="flex items-center space-x-2">
                                            <div className="w-6 h-0.5 bg-blue-600"></div>
                                            <span>Observed Data</span>
                                        </div>
                                        <div className="flex items-center space-x-2">
                                            <div className="w-6 h-0.5 bg-green-600 border-t-2 border-dashed border-green-600"></div>
                                            <span>True Signal</span>
                                        </div>
                                        <div className="flex items-center space-x-2">
                                            <div className="w-6 h-0.5 bg-red-500 opacity-70"></div>
                                            <span>Noise Component</span>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Matrix Statistics */}
                    {testMatrix && (
                        <div className="bg-white rounded-lg shadow-lg p-6 mt-6">
                            <h3 className="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                                <span className="text-2xl mr-2">📊</span>
                                Matrix Statistics
                            </h3>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                <div className="text-center p-4 bg-gray-50 rounded-lg">
                                    <p className="text-2xl font-bold text-gray-900">{P}</p>
                                    <p className="text-sm text-gray-600">Variables (P)</p>
                                </div>
                                <div className="text-center p-4 bg-gray-50 rounded-lg">
                                    <p className="text-2xl font-bold text-gray-900">{N}</p>
                                    <p className="text-sm text-gray-600">Samples (N)</p>
                                </div>
                                <div className="text-center p-4 bg-gray-50 rounded-lg">
                                    <p className="text-2xl font-bold text-gray-900">{K}</p>
                                    <p className="text-sm text-gray-600">Signal Variables (K)</p>
                                </div>
                                <div className="text-center p-4 bg-gray-50 rounded-lg">
                                    <p className="text-2xl font-bold text-gray-900">{P - K}</p>
                                    <p className="text-sm text-gray-600">Noise Variables</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Signal Chart Component
        function SignalChart({ data, N }) {
            if (!data) return null;

            const { observed, trueSignal, noise } = data;
            
            // Chart dimensions
            const width = 700;
            const height = 300;
            const margin = { top: 20, right: 40, bottom: 60, left: 60 };
            const chartWidth = width - margin.left - margin.right;
            const chartHeight = height - margin.top - margin.bottom;
            
            // Find data ranges
            const allValues = [...observed, ...trueSignal, ...noise];
            const maxVal = Math.max(...allValues);
            const minVal = Math.min(...allValues);
            const range = maxVal - minVal;
            const padding = range * 0.1;
            
            // Scale functions
            const xScale = (index) => margin.left + (index / (N - 1)) * chartWidth;
            const yScale = (value) => margin.top + chartHeight - ((value - minVal + padding) / (range + 2 * padding)) * chartHeight;
            
            // Generate path strings
            const observedPath = observed.map((val, idx) => 
                `${idx === 0 ? 'M' : 'L'} ${xScale(idx)} ${yScale(val)}`
            ).join(' ');
            
            const signalPath = trueSignal.map((val, idx) => 
                `${idx === 0 ? 'M' : 'L'} ${xScale(idx)} ${yScale(val)}`
            ).join(' ');
            
            const noisePath = noise.map((val, idx) => 
                `${idx === 0 ? 'M' : 'L'} ${xScale(idx)} ${yScale(val)}`
            ).join(' ');

            return (
                <svg width="100%" height="100%" viewBox={`0 0 ${width} ${height}`} className="p-4">
                    {/* Grid */}
                    <defs>
                        <pattern id="grid" width="50" height="30" patternUnits="userSpaceOnUse">
                            <path d="M 50 0 L 0 0 0 30" fill="none" stroke="#e5e7eb" strokeWidth="1"/>
                        </pattern>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#grid)" />
                    
                    {/* Axes */}
                    <line x1={margin.left} y1={margin.top} x2={margin.left} y2={height - margin.bottom} stroke="#374151" strokeWidth="2"/>
                    <line x1={margin.left} y1={height - margin.bottom} x2={width - margin.right} y2={height - margin.bottom} stroke="#374151" strokeWidth="2"/>
                    
                    {/* Y-axis labels */}
                    {[0, 0.25, 0.5, 0.75, 1].map(frac => {
                        const value = minVal - padding + frac * (range + 2 * padding);
                        const y = yScale(value);
                        return (
                            <g key={frac}>
                                <line x1={margin.left - 5} y1={y} x2={margin.left} y2={y} stroke="#374151"/>
                                <text x={margin.left - 10} y={y + 3} textAnchor="end" fontSize="12" fill="#374151">
                                    {value.toFixed(2)}
                                </text>
                            </g>
                        );
                    })}
                    
                    {/* X-axis labels */}
                    {[0, Math.floor(N*0.25), Math.floor(N*0.5), Math.floor(N*0.75), N-1].map(sample => {
                        const x = xScale(sample);
                        return (
                            <g key={sample}>
                                <line x1={x} y1={height - margin.bottom} x2={x} y2={height - margin.bottom + 5} stroke="#374151"/>
                                <text x={x} y={height - margin.bottom + 20} textAnchor="middle" fontSize="12" fill="#374151">
                                    {sample}
                                </text>
                            </g>
                        );
                    })}
                    
                    {/* Data lines */}
                    <path d={noisePath} fill="none" stroke="#EF4444" strokeWidth="1" opacity="0.7"/>
                    <path d={signalPath} fill="none" stroke="#10B981" strokeWidth="3" strokeDasharray="5,5"/>
                    <path d={observedPath} fill="none" stroke="#3B82F6" strokeWidth="2"/>
                    
                    {/* Axis labels */}
                    <text x={width/2} y={height - 10} textAnchor="middle" fontSize="14" fill="#374151" fontWeight="500">
                        Sample Index
                    </text>
                    <text x="20" y={height/2} textAnchor="middle" fontSize="14" fill="#374151" fontWeight="500" transform={`rotate(-90, 20, ${height/2})`}>
                        Signal Amplitude
                    </text>
                </svg>
            );
        }

        // Render the application
        ReactDOM.render(<TestDataGenerator />, document.getElementById('root'));
    </script>
</body>
</html>
